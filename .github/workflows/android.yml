- name: إعداد Java
  uses: actions/setup-java@v4

- name: إنشاء مخزن مفاتيح للتصحيح
  run: |
    keytool -genkeypair -v \
      -keystore debug.keystore \
      -storepass android \
      -alias androiddebugkey \
      -keypass android \
      -keyalg RSA \
      -keysize 2048 \
      -validity 10000 \
      -dname "CN=Android Debug,O=Android,C=US"

- name: بناء APK
  run: ./gradlew assembleDebug
